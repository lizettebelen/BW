<!DOCTYPE html>
<html>
<head>
    <title>Delete Confirmation Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: #f0f0f0;
        }
        .container {
            background: white;
            padding: 20px;
            border-radius: 8px;
            max-width: 500px;
            margin: 0 auto;
        }
        button {
            padding: 10px 20px;
            background: #ff6b6b;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background: #ee5a24;
        }
        .info {
            background: #e3f2fd;
            padding: 15px;
            border-radius: 5px;
            margin: 15px 0;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Delete Confirmation Test</h1>
        <div class="info">
            <strong>Instructions:</strong>
            <ol>
                <li>Click the "Test Delete" button below</li>
                <li>You should see a confirmation dialog</li>
                <li>Click "OK" to confirm or "Cancel" to cancel</li>
                <li>Check browser console (F12) for logs</li>
            </ol>
        </div>

        <span id="recordCount" style="display:none;">5</span>
        <span id="currentRecordCount" style="display:none;">5</span>

        <button onclick="showDeleteModal()">Test Delete</button>

        <div class="info" style="margin-top: 20px; background: #f5f5f5;">
            <strong>Browser Console Output:</strong>
            <div id="output" style="background: black; color: lime; padding: 10px; height: 200px; overflow-y: auto; font-family: monospace; font-size: 12px;"></div>
        </div>
    </div>

    <script>
        // Override console.log to show output on page
        const output = document.getElementById('output');
        const originalLog = console.log;
        console.log = function(...args) {
            originalLog.apply(console, args);
            const message = args.map(arg => {
                if (typeof arg === 'object') {
                    return JSON.stringify(arg);
                }
                return String(arg);
            }).join(' ');
            output.innerHTML += message + '<br>';
            output.scrollTop = output.scrollHeight;
        };

        function showDeleteModal() {
            console.log('DELETE BUTTON CLICKED!');
            
            const countElement = document.getElementById('currentRecordCount');
            let count = '0';
            if (countElement) {
                count = countElement.textContent.replace(/,/g, '');
            }
            
            console.log('Current count:', count);
            
            // Simple confirm dialog - NO conditions, just show it
            const message = 'WARNING!\n\nAre you sure you want to DELETE ALL DATA?\n\n' + count + ' records will be permanently deleted.\n\nThis action CANNOT be undone!';
            console.log('Showing confirm dialog with message:', message);
            
            const result = confirm(message);
            console.log('Confirm result:', result);
            
            if (result === true) {
                console.log('User clicked OK - would delete now');
            } else {
                console.log('User clicked Cancel');
            }
        }
    </script>
</body>
</html>
